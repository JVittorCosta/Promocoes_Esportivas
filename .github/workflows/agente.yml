name: Agente
# v9
on:
  schedule:
    - cron: '30 8 * * *'
    - cron: '0 13 * * *'
    - cron: '0 20 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restaurar banco de dados
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: promocoes.db
          key: promocoes-db-v2
          restore-keys: |
            promocoes-db-v2

      - run: pip install playwright requests

      - run: playwright install chromium

      - run: python scraper.py

      - run: python social_scraper.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

      - run: python email_scraper.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}

      - run: python notifier.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Salvar banco de dados
        uses: actions/cache/save@v4
        with:
          path: promocoes.db
          key: promocoes-db-v2-${{ github.run_id }}
