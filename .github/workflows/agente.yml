name: Agente
# v11
on:
  schedule:
    - cron: '30 10 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install playwright requests

      - run: playwright install chromium

      - run: python scraper.py

      - run: python social_scraper.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

      - run: python email_scraper.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}

      - run: python notifier.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Salvar banco de dados no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add promocoes.db
          git diff --staged --quiet || git commit -m "Atualizar banco de dados"
          git push
